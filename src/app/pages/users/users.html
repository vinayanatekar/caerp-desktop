<div class="page-header">

  <h2>Users</h2>

  <button
      mat-flat-button
      color="primary"
      routerLink="/add-user">

      Add User

  </button>

</div>

<table border="1" width="100%">

<thead>

<tr>

<th>ID</th>
<th>PAN</th>
<th>Name</th>
<th>action</th>

</tr>

</thead>

<tbody>

<tr *ngFor="let user of users">

<td>{{user.id}}</td>
<td>{{user.pan}}</td>
<td>{{user.name}}</td>
<td><button
  mat-raised-button
  color="primary"
  (click)="openIncomeTaxPortal(user.id)">
  Open Income Tax Portal
</button></td>

</tr>

</tbody>

</table>
